# --- ADIM 1: Ilk kurulum (HTTP only, SSL oncesi) ---
# Bu config ile baslayacagiz, sonra SSL ekleyecegiz

server {
    listen 80;
    server_name nocodb.mindid.shop;

    # Certbot dogrulama icin
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    # NocoDB'ye proxy
    location / {
        proxy_pass http://nocodb:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket destegi (NocoDB realtime icin)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

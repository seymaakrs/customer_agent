version: "3.9"

services:
  nocodb:
    image: nocodb/nocodb:latest
    container_name: mindid-nocodb
    restart: always
    ports:
      - "8080:8080"
    environment:
      NC_DB: "pg://db:5432?u=nocodb&p=${POSTGRES_PASSWORD}&d=nocodb"
      NC_AUTH_JWT_SECRET: "${JWT_SECRET}"
      NC_PUBLIC_URL: "https://nocodb.mindid.shop"
      NC_DISABLE_TELE: "true"
    depends_on:
      - db
    volumes:
      - nc_data:/usr/app/data

  db:
    image: postgres:15
    container_name: mindid-nocodb-db
    restart: always
    environment:
      POSTGRES_USER: nocodb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nocodb
    volumes:
      - pg_data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    container_name: mindid-nocodb-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
    depends_on:
      - nocodb

  certbot:
    image: certbot/certbot
    container_name: mindid-nocodb-certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  nc_data:
  pg_data:
  certbot_etc:
  certbot_var:

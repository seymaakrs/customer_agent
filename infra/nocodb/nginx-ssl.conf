# SSL aktif edildikten sonra nginx.conf'u bununla degistir

server {
    listen 80;
    server_name nocodb.mindid.shop;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name nocodb.mindid.shop;

    ssl_certificate /etc/letsencrypt/live/nocodb.mindid.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nocodb.mindid.shop/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://nocodb:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket destegi
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
